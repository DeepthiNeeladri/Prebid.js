
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dynamic Ad Placement Demo (GAM)</title>
    <link rel="stylesheet" href="https://cdn.vidible.tv/prod/2020-03/05/5d370e5afa1de000018eed6b_v4.css">

   <!-- prebid.js version 3.19.0 with custom fixed oneVideo adaptor -->
     <script src="../../build/dev/prebid.js" async=true></script>

    <!-- Load Google Ad Manager -->
    <script async src="//www.googletagservices.com/tag/js/gpt.js"></script>
    <script>
        var PREBID_TIMEOUT = 2000;
        var FAILSAFE_TIMEOUT = 3000;

        var adUnits = [{
            code: '/19968336/header-bid-tag-0',
            mediaTypes: {
                banner: {
                    sizes: [300, 250]
                }
            },
            bids: [{
                bidder: 'oneVideo',
                params: {
                    video: {
                        playerWidth: 300,
                        playerHeight: 250,
                        mimes: ['video/mp4', 'application/javascript'],
                        api: [1, 2],
                        display: 1,
                        inventoryid: 1262165
                    },
                    site: {
                        page: 'https://vidible.tv',
                        ref: 'https://vidible.tv'
                    },
                    pubId: 'HBExchangeDAP'
                }
            }]
        }];

        // ======== DO NOT EDIT BELOW THIS LINE =========== //
        var googletag = googletag || {};
        googletag.cmd = googletag.cmd || [];
        googletag.cmd.push(function () {
            googletag.pubads().disableInitialLoad();
        });

        var pbjs = pbjs || {};
        pbjs.que = pbjs.que || [];


        pbjs.que.push(function () {
            //cache needed to support video
            pbjs.setConfig({
                debug: true
            })
            pbjs.setConfig({
                useBidCache: true
            });
            pbjs.setConfig({
                cache: {
                    url: 'https://prebid.adnxs.com/pbc/v1/cache'
                }
            });
            pbjs.addAdUnits(adUnits);
            pbjs.requestBids({
                bidsBackHandler: initAdserver,
                timeout: PREBID_TIMEOUT
            });
        });

        function initAdserver() {
            if (pbjs.initAdserverSet) return;
            pbjs.initAdserverSet = true;
            googletag.cmd.push(function () {
                pbjs.que.push(function () {
                    pbjs.setTargetingForGPTAsync();
                    googletag.pubads().refresh();
                });
            });
        }
        // in case PBJS doesn't load
        setTimeout(function () {
            initAdserver();
        }, FAILSAFE_TIMEOUT);

        googletag.cmd.push(function () {
            googletag.defineSlot('/19968336/header-bid-tag-0', [300, 250], 'div-1').addService(googletag
                .pubads());
            googletag.pubads().enableSingleRequest();
            googletag.enableServices();
        });
    </script>

</head>

<body>
    <div class="container">
        <img src="https://s.yimg.com/mi/verizonmedia/assets/images/verizon-logo-1.0.1.png" aligh='middle' />
        <h1>Dynamic Ad Placement Demo</h1>
        <h2>Renderer by GAM</h2>
        <p style="color:crimson"><b>Important! You must be in location U.S West Coast for the test creative to load</b>
        </p>

        <div id="div-1" style="width:300; height: 250px; background-color:darkgray; margin: auto">
            <script type='text/javascript'>
                googletag.cmd.push(function () {
                    googletag.display('div-1');
                });
            </script>
        </div>
    </div>
</body>

</html>
